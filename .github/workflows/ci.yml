name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LearningPlatform
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_prep_db?schema=public
      PAYLOAD_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_prep_db?schema=payload
      AUTH_SECRET: ci-only-test-secret-minimum-32-characters-long
      PAYLOAD_SECRET: ci-only-test-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LearningPlatform/package-lock.json

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LearningPlatform

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_prep_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_prep_db?schema=public
      PAYLOAD_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_prep_db?schema=payload
      AUTH_SECRET: ci-only-test-secret-minimum-32-characters-long
      PAYLOAD_SECRET: ci-only-test-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test
      SKIP_PAYLOAD_TESTS: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LearningPlatform/package-lock.json

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: LearningPlatform/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: LearningPlatform

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_prep_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_prep_db?schema=public
      # FIX: Payload CMS must use `?schema=payload`, NOT `?schema=public`.
      PAYLOAD_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_prep_db?schema=payload
      AUTH_SECRET: ci-only-test-secret-minimum-32-characters-long
      PAYLOAD_SECRET: ci-only-test-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: LearningPlatform/package-lock.json

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Apply Payload CMS migrations
        run: npm run payload:migrate

      - name: Build Next.js application
        env:
          NODE_ENV: production
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (project in subfolder)
        run: docker build -t exam-prep-app ./LearningPlatform
